<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Card Draw</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="carddraw.css" />
    </head>
    <body>

        <div class="container">

            <!-- Back -->
            <div>
                <a class="btn-back" href="index.html">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Back
                </a>
            </div>

            <!-- Hand summary -->
            <div class="card">
                <div class="section-label">Current cards</div>
                <div class="hand-grid" id="handGrid"></div>
            </div>

            <!-- Draw info -->
            <div class="card draw-info-card">
                <div class="draw-info-row">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="14" height="18" rx="2"/><rect x="8" y="2" width="14" height="18" rx="2"/></svg>
                    <span id="drawsAvailable"><strong>3</strong> available card draws</span>
                </div>
                <div class="draw-info-row muted">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span id="nextDrawTimer">— until next free draw</span>
                </div>
            </div>

            <!-- Flop -->
            <div class="card">
                <div class="section-label">Flop <span class="section-hint">— tap a card to take it</span></div>
                <div class="flop" id="flop"></div>
                <button class="btn-blind" id="blindBtn" onclick="blindDraw()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    Blind draw
                </button>
            </div>

        </div>

        <script src="carddraw.js"></script>
    </body>
</html>
