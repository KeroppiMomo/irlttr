<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Challenges</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="challenges.css" />
    </head>
    <body>

        <div class="container">

            <!-- Back -->
            <div>
                <a class="btn-back" href="index.html">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Back
                </a>
            </div>

            <!-- ── IDLE VIEW ── -->
            <div id="viewIdle">
                <div style="margin-bottom: 1rem;">
                    <button class="btn-primary" onclick="startChallenge()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Start challenge
                    </button>
                </div>

                <div class="card">
                    <div class="section-label">Challenge list</div>
                    <div id="challengeList" class="challenge-list"></div>
                </div>
            </div>

            <!-- ── ACTIVE VIEW ── -->
            <div id="viewActive" style="display:none;">
                <div class="card active-card">
                    <div class="active-eyebrow">
                        <span class="pulse-dot"></span>
                        Challenge in progress: choose one of the following
                    </div>
                    <div id="activeChallenge1"></div>

                    <br>

                    <div id="activeChallenge2"></div>
                </div>

                <div class="action-row">
                    <button class="btn-complete" onclick="endChallenge('complete')">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        Complete
                    </button>
                    <button class="btn-veto" onclick="endChallenge('veto-point')">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                        Veto (5-point penalty)
                    </button>
                    <button class="btn-veto" onclick="endChallenge('veto-time')">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                        Veto (no challenge in 20 min)
                    </button>
                </div>
            </div>

        </div>

        <script src="challenges.js"></script>
    </body>
</html>
