<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Game Tracker</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>

        <div class="container">

            <!-- Team selector -->
            <div class="card">
                <div class="section-label">Who are you?</div>
                <div class="team-row">
                    <select id="teamSelect" onchange="onTeamChange()">
                        <option value="">— Select team —</option>
                        <option value="red">Team Red</option>
                        <option value="blue">Team Blue</option>
                        <option value="yellow">Team Yellow</option>
                        <option value="green">Team Green</option>
                    </select>
                    <span class="team-name-display" id="teamNameDisplay">—</span>
                    <input class="team-name-edit" id="teamNameInput" type="text" maxlength="30" placeholder="Team name" />
                    <button class="btn-change-name" id="changeNameBtn" onclick="toggleNameEdit()">Change name</button>
                </div>
            </div>

            <!-- Timer -->
            <div class="card timer-card">
                <div class="timer-label">Time since game started</div>
                <div class="timer-display" id="timerDisplay">00:00:00</div>
            </div>

            <!-- Nav buttons -->
            <div class="nav-grid">
                <a class="nav-btn" href="map.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
                    Map
                </a>
                <a class="nav-btn" href="ticket.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/></svg>
                    Ticket
                </a>
                <a class="nav-btn" href="carddraw.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="14" height="18" rx="2"/><rect x="8" y="2" width="14" height="18" rx="2"/></svg>
                    Card draw
                </a>
                <a class="nav-btn" href="challenges.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
                    Challenges
                </a>
            </div>

            <!-- Log -->
            <div class="card">
                <div class="section-label">Log</div>
                <div class="log-area" id="logArea">
                    <div class="log-empty" id="logEmpty">No entries yet.</div>
                </div>
                <div class="log-input-row">
                    <input class="log-input" id="logInput" type="text" placeholder="Add a log entry…" maxlength="200"
                    onkeydown="if(event.key==='Enter') addLogEntry()" />

                    <button class="btn-log" onclick="addLogEntry()">Add</button>
                </div>
                <div class="no-team-warning" id="noTeamWarning">Select a team before adding log entries.</div>
            </div>

        </div>

        <script src="index.js"></script>

    </body>
</html>
