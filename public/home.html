<!DOCTYPE html>

<!-- Generated by Claude -->

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Game Tracker</title>
        <link href="style.css" rel="stylesheet" />
    </head>
    <body>

        <div class="container">

            <!-- Team selector -->
            <div class="card">
                <div class="section-label">Who are you?</div>
                <div class="team-row">
                    <select id="teamSelect" onchange="onTeamChange()">
                        <option value="">— Select team —</option>
                        <option value="red">Team Red</option>
                        <option value="blue">Team Blue</option>
                        <option value="yellow">Team Yellow</option>
                        <option value="green">Team Green</option>
                    </select>
                    <span class="team-name-display" id="teamNameDisplay">—</span>
                    <input class="team-name-edit" id="teamNameInput" type="text" maxlength="30" placeholder="Team name" />
                    <button class="btn-change-name" id="changeNameBtn" onclick="toggleNameEdit()">Change name</button>
                </div>
            </div>

            <!-- Timer -->
            <div class="card timer-card">
                <div class="timer-label">Time since game started</div>
                <div class="timer-display" id="timerDisplay">00:00:00</div>
            </div>

            <!-- Nav buttons -->
            <div class="nav-grid">
                <a class="nav-btn" href="map.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
                    Map
                </a>
                <a class="nav-btn" href="ticket.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/></svg>
                    Ticket
                </a>
                <a class="nav-btn" href="carddraw.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="14" height="18" rx="2"/><rect x="8" y="2" width="14" height="18" rx="2"/></svg>
                    Card draw
                </a>
                <a class="nav-btn" href="challenges.html">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
                    Challenges
                </a>
            </div>

            <!-- Log -->
            <div class="card">
                <div class="section-label">Log</div>
                <div class="log-area" id="logArea">
                    <div class="log-empty" id="logEmpty">No entries yet.</div>
                </div>
                <div class="log-input-row">
                    <input class="log-input" id="logInput" type="text" placeholder="Add a log entry…" maxlength="200"
                    onkeydown="if(event.key==='Enter') addLogEntry()" />
                    <button class="btn-log" onclick="addLogEntry()">Add</button>
                </div>
                <div class="no-team-warning" id="noTeamWarning">Select a team before adding log entries.</div>
            </div>

        </div>

        <script>
            // ── Persistent state keys ──
            const GAME_START_KEY = 'game_start_time';
            const LOG_KEY        = 'game_log';
            const TEAM_NAMES_KEY = 'team_names';

            // ── Team colours ──
            const TEAM_COLORS = { red: '#e53e3e', blue: '#3182ce', yellow: '#d69e2e', green: '#38a169' };

            // ── Local player state ──
            let currentTeam = localStorage.getItem('my_team') || '';
            let isEditingName = false;

            // ── Shared state (simulated via localStorage; swap for a backend/Supabase for true multi-device sync) ──
            function getTeamNames() {
                try { return JSON.parse(localStorage.getItem(TEAM_NAMES_KEY)) || {}; } catch { return {}; }
            }
            function saveTeamName(team, name) {
                const names = getTeamNames();
                names[team] = name;
                localStorage.setItem(TEAM_NAMES_KEY, JSON.stringify(names));
            }
            function getTeamName(team) {
                if (!team) return '—';
                const names = getTeamNames();
                return names[team] || capitalize(team) + ' Team';
            }

            function getLog() {
                try { return JSON.parse(localStorage.getItem(LOG_KEY)) || []; } catch { return []; }
            }
            function saveLog(log) { localStorage.setItem(LOG_KEY, JSON.stringify(log)); }

            function getGameStart() {
                const v = localStorage.getItem(GAME_START_KEY);
                if (!v) {
                    const now = Date.now();
                    localStorage.setItem(GAME_START_KEY, now);
                    return now;
                }
                return parseInt(v, 10);
            }

            function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

            // ── Timer ──
            const gameStart = getGameStart();
            function updateTimer() {
                const elapsed = Math.floor((Date.now() - gameStart) / 1000);
                const h = Math.floor(elapsed / 3600);
                const m = Math.floor((elapsed % 3600) / 60);
                const s = elapsed % 60;
                document.getElementById('timerDisplay').textContent =
                    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            }
            setInterval(updateTimer, 1000);
            updateTimer();

            // ── Team change ──
            function onTeamChange() {
                const sel = document.getElementById('teamSelect');
                currentTeam = sel.value;
                localStorage.setItem('my_team', currentTeam);
                applyTeamTheme();
                updateNameDisplay();
                if (isEditingName) cancelNameEdit();
            }

            function applyTeamTheme() {
                document.body.className = currentTeam ? 'team-' + currentTeam : '';
            }

            function updateNameDisplay() {
                const display = document.getElementById('teamNameDisplay');
                display.textContent = currentTeam ? getTeamName(currentTeam) : '—';
            }

            // ── Name edit ──
            function toggleNameEdit() {
                if (!currentTeam) return;
                if (!isEditingName) startNameEdit();
                else saveNameEdit();
            }

            function startNameEdit() {
                isEditingName = true;
                const display = document.getElementById('teamNameDisplay');
                const input   = document.getElementById('teamNameInput');
                const btn     = document.getElementById('changeNameBtn');
                display.style.display = 'none';
                input.style.display = 'block';
                input.value = getTeamName(currentTeam);
                input.focus();
                input.select();
                btn.textContent = 'Save';
                input.onkeydown = (e) => { if (e.key === 'Enter') saveNameEdit(); if (e.key === 'Escape') cancelNameEdit(); };
            }

            function saveNameEdit() {
                const input = document.getElementById('teamNameInput');
                const name = input.value.trim();
                if (name && currentTeam) saveTeamName(currentTeam, name);
                finishNameEdit();
            }

            function cancelNameEdit() { finishNameEdit(); }

            function finishNameEdit() {
                isEditingName = false;
                document.getElementById('teamNameDisplay').style.display = '';
                document.getElementById('teamNameInput').style.display = 'none';
                document.getElementById('changeNameBtn').textContent = 'Change name';
                updateNameDisplay();
            }

            // ── Log ──
            function renderLog() {
                const area  = document.getElementById('logArea');
                const empty = document.getElementById('logEmpty');
                const log   = getLog();
                const existing = area.querySelectorAll('.log-entry');
                existing.forEach(e => e.remove());

                if (log.length === 0) {
                    empty.style.display = '';
                    return;
                }
                empty.style.display = 'none';

                log.slice().reverse().forEach(entry => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';

                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'log-time';
                    timeSpan.textContent = entry.time;

                    const tag = document.createElement('span');
                    tag.className = 'log-team-tag ' + (entry.team || '');
                    tag.textContent = entry.teamLabel || '?';

                    const text = document.createElement('span');
                    text.className = 'log-text';
                    text.textContent = entry.text;

                    div.appendChild(timeSpan);
                    div.appendChild(tag);
                    div.appendChild(text);
                    area.insertBefore(div, area.firstChild);
                });
            }

            function addLogEntry() {
                const input   = document.getElementById('logInput');
                const warning = document.getElementById('noTeamWarning');
                const text    = input.value.trim();
                if (!text) return;
                if (!currentTeam) { warning.style.display = ''; setTimeout(() => warning.style.display = 'none', 3000); return; }

                const now = new Date();
                const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

                const log = getLog();
                log.push({
                    time:      timeStr,
                    team:      currentTeam,
                    teamLabel: getTeamName(currentTeam),
                    text:      text
                });
                saveLog(log);
                input.value = '';
                renderLog();
            }

            // ── Poll for log updates every 5s (for multi-device sync via shared storage) ──
            setInterval(renderLog, 5000);

            // ── Init ──
            (function init() {
                if (currentTeam) {
                    document.getElementById('teamSelect').value = currentTeam;
                    applyTeamTheme();
                }
                updateNameDisplay();
                renderLog();
            })();
        </script>

    </body>
</html>
