<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tickets</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>

        <div class="container">

            <!-- Back -->
            <div>
                <a class="btn-back" href="index.html">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Back
                </a>
            </div>

            <!-- New tickets button -->
            <a class="btn-primary" href="new-ticket.html">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                New tickets (draw 3, keep at least 1)
            </a>

            <!-- Current tickets -->
            <div class="card">
                <div class="section-label">Current tickets</div>
                <div id="ticketTableWrap">
                    <div class="ticket-empty" id="ticketEmpty">No tickets drawn yet.</div>
                    <table class="ticket-table" id="ticketTable" style="display:none;">
                        <thead>
                            <tr>
                                <th style="width:60px;">Done?</th>
                                <th style="width:52px;">Points</th>
                                <th>From</th>
                                <th style="width:12px;"></th>
                                <th>To</th>
                                <th style="width:32px;"></th>
                            </tr>
                        </thead>
                        <tbody id="ticketBody"></tbody>
                    </table>
                </div>
            </div>

        </div>

        <script src="ticket.js"></script>

    </body>
</html>
